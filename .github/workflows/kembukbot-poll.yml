name: Kembukbot Polling Agent

on:
  schedule:
    - cron: '*/3 * * * *'  # Every 3 minutes
  workflow_dispatch:

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install deps
        run: npm ci

      - name: Build check
        run: npm run build

      - name: Commit if changes
        run: |
          git config user.name "Kembukbot"
          git config user.email "kembukbot@kembuk.com"
          git add -A
          git diff --staged --quiet || git commit -m "Kembukbot: Auto-build check - $(date)"
          git push
