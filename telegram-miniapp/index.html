<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kembuk Panel</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, sans-serif; background: #1a1a2e; color: #fff; min-height: 100vh; padding: 20px; }
    .header { text-align: center; margin-bottom: 24px; }
    .header h1 { font-size: 24px; margin-bottom: 4px; }
    .header p { color: #888; font-size: 14px; }
    .card { background: #16213e; border-radius: 16px; padding: 16px; margin-bottom: 16px; }
    .card-title { font-size: 12px; color: #888; text-transform: uppercase; margin-bottom: 12px; }
    .agent { display: flex; align-items: center; justify-content: space-between; padding: 12px; background: #0f3460; border-radius: 12px; margin-bottom: 8px; }
    .agent-info { display: flex; align-items: center; gap: 12px; }
    .agent-avatar { width: 40px; height: 40px; background: #e94560; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-weight: bold; }
    .agent-name { font-weight: 600; }
    .agent-role { font-size: 12px; color: #888; }
    .status { padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; }
    .status.on { background: #00d26a; color: #000; }
    .cron-item { display: flex; align-items: center; justify-content: space-between; padding: 14px; background: #0f3460; border-radius: 12px; margin-bottom: 8px; }
    .cron-info h4 { font-size: 14px; margin-bottom: 4px; }
    .cron-info p { font-size: 12px; color: #888; }
    .btn { padding: 10px 16px; border-radius: 10px; border: none; font-size: 13px; font-weight: 600; cursor: pointer; }
    .btn-on { background: #e94560; color: #fff; }
    .btn-off { background: #00d26a; color: #000; }
    .btn:disabled { opacity: 0.5; }
    .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 16px; }
    .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .stat { background: #0f3460; border-radius: 12px; padding: 14px; text-align: center; }
    .stat-value { font-size: 20px; font-weight: bold; color: #e94560; }
    .stat-label { font-size: 11px; color: #888; margin-top: 4px; }
    .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #00d26a; color: #000; padding: 12px 24px; border-radius: 10px; font-weight: 600; opacity: 0; transition: 0.3s; }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>
  <div class="header"><h1>🔧 Kembuk Panel</h1><p>Workflow Management</p></div>
  <div class="card">
    <div class="card-title">🤖 Agents</div>
    <div class="agent">
      <div class="agent-info"><div class="agent-avatar">N</div><div><div class="agent-name">Ndrogrok</div><div class="agent-role">Dev Agent</div></div></div>
      <div class="status on">ONLINE</div>
    </div>
    <div class="agent">
      <div class="agent-info"><div class="agent-avatar" style="background:#00d26a">K</div><div><div class="agent-name">Kembukbot</div><div class="agent-role">QA Agent</div></div></div>
      <div class="status on">ONLINE</div>
    </div>
  </div>
  <div class="card">
    <div class="card-title">⏰ Cron Jobs</div>
    <div class="cron-item">
      <div class="cron-info"><h4>QA Polling</h4><p>*/3 * * * *</p></div>
      <button class="btn btn-off" id="btn-cron" onclick="toggleCron()">ON</button>
    </div>
  </div>
  <div class="card">
    <div class="card-title">📊 Stats</div>
    <div class="stats-grid">
      <div class="stat"><div class="stat-value" id="commits">-</div><div class="stat-label">Commits</div></div>
      <div class="stat"><div class="stat-value" id="deploys">-</div><div class="stat-label">Deploys</div></div>
      <div class="stat"><div class="stat-value">0</div><div class="stat-label">Errors</div></div>
    </div>
    <div class="btn-group">
      <button class="btn btn-on" onclick="syncNow()">🔄 Sync</button>
      <button class="btn btn-off" style="background:#16213e;color:#fff;border:1px solid #333" onclick="refreshStats()">📋 Refresh</button>
    </div>
  </div>
  <div id="toast" class="toast">Success!</div>
  <script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();
    function showToast(msg) { const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2000); }
    function toggleCron() { const btn = document.getElementById('btn-cron'); const isOn = btn.textContent === 'ON'; btn.textContent = '...'; btn.disabled = true; setTimeout(() => { btn.textContent = isOn ? 'OFF' : 'ON'; btn.className = isOn ? 'btn btn-off' : 'btn btn-on'; btn.disabled = false; showToast(isOn ? 'Cron Disabled' : 'Cron Enabled'); }, 500); }
    function syncNow() { showToast('Syncing...'); setTimeout(() => showToast('Sync Complete!'), 1000); }
    function refreshStats() { document.getElementById('commits').textContent = '12'; document.getElementById('deploys').textContent = '5'; showToast('Updated!'); }
  </script>
</body>
</html>
